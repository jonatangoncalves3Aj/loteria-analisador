name: Atualizar Dados da Loteria

on:
  schedule:
    - cron: '0 14 * * *'   # 11h BRT (14h UTC) todo dia
  workflow_dispatch:         # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar dados da Caixa
        run: node scripts/fetch-lottery-data.mjs

      - name: Commit e push dos dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: atualizar resultados da loteria'
          file_pattern: 'data/*.json'
